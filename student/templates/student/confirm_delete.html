
{% extends 'student/base.html' %}

{% block title %}Delete Student - {{ student.name }} - OneCampus{% endblock %}

{% block content %}
    <section class="min-h-screen flex items-center justify-center py-20">
        <div class="max-w-md w-full mx-auto">
            <div class="gradient-border">
                <div class="p-8">
                    <h2 class="text-2xl font-bold text-gradient mb-6 text-center">
                        Confirm Deletion
                    </h2>
                    <p class="text-center text-slate-600 dark:text-slate-300 mb-8">
                        Are you sure you want to delete <span class="font-semibold">{{ student.name }}</span> (USN: {{ student.usn }})?
                    </p>
                    <form method="post" class="flex justify-center space-x-4">
                        {% csrf_token %}
                        <button type="submit" class="cta-button px-6 py-2 rounded-lg bg-gradient-to-r from-red-500 to-red-600 text-white hover:opacity-90 transition-all duration-300 shadow-lg hover:shadow-xl">
                            Yes, Delete
                        </button>
                        <a href="{% url 'dashboard' %}" class="cta-button px-6 py-2 rounded-lg bg-gradient-to-r from-primary to-secondary text-white hover:opacity-90 transition-all duration-300 shadow-lg hover:shadow-xl">
                            Cancel
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
